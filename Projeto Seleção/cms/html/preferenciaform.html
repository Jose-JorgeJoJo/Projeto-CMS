<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Configurações</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .nav { margin-bottom: 20px; }
        img {display: block;margin-bottom: 8px;border-radius: 6px;border: 1px solid #ddd;padding: 3px;background: #fff;}
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.php?class=Dashboard">← Voltar ao Dashboard</a>
    </div>

    <h2>Configurações da Landing Page</h2>
    
    {mensagem}

    <form method="POST" action="index.php?class=PreferenciaForm&method=save" enctype="multipart/form-data">
        
        <div class="form-group">
            <label>Título da Landing:</label>
            <input type="text" name="titulo_landing" value="{titulo_landing}">
        </div>

        <label>Favicon:</label>
        <img src="{favicon}" width="50"><br>
        <input type="file" name="favicon">
        <input type="hidden" name="favicon_atual" value="{favicon}">

        <div class="form-group">
            <label>Logo Cabeçalho:</label>
            <img src="{logo_cabecalho}" width="120"><br>
            <input type="file" name="logo_cabecalho">
            <input type="hidden" name="logo_cabecalho_atual" value="{logo_cabecalho}">
        </div>

        <div class="form-group">
            <label>Redes Sociais:</label>
            <input type="text" name="link_facebook" placeholder="Facebook" value="{link_facebook}">
            <input type="text" name="link_instagram" placeholder="Instagram" value="{link_instagram}" style="margin-top:5px;">
           <label>Imagem Facebook:</label>
            <img src="{imagem_facebook}" width="120"><br>
            <input type="file" name="imagem_facebook">
            <input type="hidden" name="imagem_facebook_atual" value="{imagem_facebook}">

            <label>Imagem Instagram:</label>
            <img src="{imagem_instagram}" width="120"><br>
            <input type="file" name="imagem_instagram">
            <input type="hidden" name="imagem_instagram_atual" value="{imagem_instagram}">
        </div>

        <h3>Home</h3>
        <div class="form-group">
            <label>Título Home:</label>
            <input type="text" name="titulo_home" value="{titulo_home}">
            <label>Subtítulo Home:</label>
            <input type="text" name="subtitulo_home" value="{subtitulo_home}">
            <label>Imagem Home:</label>
            <img src="{imagem_home}" width="120"><br>
            <input type="file" name="imagem_home">
            <input type="hidden" name="imagem_home_atual" value="{imagem_home}">
        </div>

        <h3>Seções</h3>
        <div class="form-group">
            <label>Título Características:</label>
            <input type="text" name="titulo_caracteristicas" value="{titulo_caracteristicas}">
            <label>Título Testemunho:</label>
            <input type="text" name="titulo_testemunho" value="{titulo_testemunho}">
        </div>

        <h3>Loja</h3>
        <div class="form-group">
            <label>Título Loja:</label>
            <input type="text" name="titulo_loja" value="{titulo_loja}">
            <label>Subtítulo Loja:</label>
            <input type="text" name="subtitulo_loja" value="{subtitulo_loja}">
            <label>Imagem Loja:</label>
            <img src="{imagem_loja}" width="120"><br>
            <input type="file" name="imagem_loja">
            <input type="hidden" name="imagem_loja_atual" value="{imagem_loja}">

            <label>Imagem App Store:</label>
            <img src="{imagem_appstore}" width="120"><br>
            <input type="file" name="imagem_appstore">
            <input type="hidden" name="imagem_appstore_atual" value="{imagem_appstore}">

            <label>Imagem Play Store:</label>
            <img src="{imagem_playstore}" width="120"><br>
            <input type="file" name="imagem_playstore">
            <input type="hidden" name="imagem_playstore_atual" value="{imagem_playstore}">
            <label>Link App Store:</label>
            <input type="text" name="link_appstore" value="{link_appstore}">
            <label>Link Play Store:</label>
            <input type="text" name="link_playstore" value="{link_playstore}">
        </div>

        <h3>Rodapé</h3>
        <div class="form-group">
            <label>Telefone:</label>
            <input type="text" name="telefone" value="{telefone}">
            <label>Logo Rodapé:</label>
            <img src="{logo_rodape}" width="120"><br>
            <input type="file" name="logo_rodape">
            <input type="hidden" name="logo_rodape_atual" value="{logo_rodape}">
            <label>Copyright:</label>
            <input type="text" name="mensagem_copyright" value="{mensagem_copyright}">
            <label>URL Rodapé:</label>
            <input type="text" name="url_rodape" value="{url_rodape}">
        </div>

        <button type="submit">Salvar Configurações</button>
    </form>

</body>
</html>
