<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Configurações de Testemunhos</title>
</head>
<body>
    <a href="index.php?class=Dashboard">← Dashboard</a>
    <a href="index.php?class=TestemunhoList">← Retornar</a>

    <h2>Configurações de Testemunhos</h2>

    {mensagem}

    <form method="post" enctype="multipart/form-data" action="index.php?class=TestemunhoForm&method=save">
        <label>Id:</label>
        <input type="text" name="id" value="{id}" readonly><br><br>

        <label>Nome:</label>
        <input type="text" name="nome" value="{nome}" required><br><br>

        <label>Função:</label>
        <input type="text" name="funcao" value="{funcao}"><br><br>

        <label>Título:</label>
        <input type="text" name="titulo" value="{titulo}"><br><br>

        <label>Descrição:</label>
        <input type="text" name="descricao" value="{descricao}"><br><br>


        <label>Foto:</label>
        <img src="{foto}" width="120"><br>
        <input type="file" name="foto">
        <input type="hidden" name="foto_atual" value="{foto}"><br><br>

        <label>Imagem de Fundo:</label>
        <img src="{imagem_fundo}" width="120"><br>
        <input type="file" name="imagem_fundo">
        <input type="hidden" name="imagem_fundo_atual" value="{imagem_fundo}"><br><br>


        <button type="submit">Salvar</button>
    </form>
</body>
</html>
