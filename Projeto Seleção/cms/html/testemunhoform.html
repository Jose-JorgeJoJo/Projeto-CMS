<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Configurações de Testemunhos</title>
</head>
<body>
    <a href="index.php?class=Dashboard">← Dashboard</a>
    <a href="index.php?class=TestemunhoList">← Retornar</a>

    <h2>Configurações de Testemunhos</h2>

    {mensagem}

    <form method="post" action="index.php?class=TestemunhoForm&method=save">
        <label>Id:</label>
        <input type="text" name="id" value="{id}" readonly><br><br>

        <label>Nome:</label>
        <input type="text" name="nome" value="{nome}" required><br><br>

        <label>Função:</label>
        <input type="text" name="funcao" value="{funcao}"><br><br>

        <label>Título:</label>
        <input type="text" name="titulo" value="{titulo}"><br><br>

        <label>Descrição:</label>
        <input type="text" name="descricao" value="{descricao}"><br><br>

        <label>Foto:</label>
        <input type="text" name="foto" value="{foto}"><br><br>

        <label>Imagem de Fundo:</label>
        <input type="text" name="imagem_fundo" value="{imagem_fundo}"><br><br>

        <button type="submit">Salvar</button>
    </form>
</body>
</html>
